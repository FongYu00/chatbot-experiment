<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword-Based Chatbot</title>

    <!-- ===============================
         CSS (기존 chatbot.css 통합)
    ================================ -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            color: #000000;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chatbox {
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width: 1100px;
            height: 100%;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .chat-display {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #ffffff;
            font-size: 25px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .chat-message {
            max-width: 90%;
            padding: 12px 16px;
            margin: 8px;
            border-radius: 16px;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.55;
        }

        .chat-message.user {
            align-self: flex-end;
            background-color: #d0e8ff;
            color: #000000;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-message.bot {
            align-self: flex-start;
            background-color: #d6f7da;
            color: #000000;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
        }

        .input-area input {
            flex-grow: 1;
            padding: 35px;
            border: none;
            background-color: #f2f2f2;
            color: #000000;
            font-size: 25px;
            outline: none;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .input-area button {
            padding: 15px 25px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            transition: background-color 0.3s;
        }

        .input-area button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="chatbox">
        <div class="chat-display" id="chatDisplay"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="무엇이든 물어보세요."
                   autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false">
            <button onclick="handleSubmit()">보내기</button>
        </div>
    </div>
</div>

<!-- ===============================
     JavaScript
================================ -->
<script>
const chatDisplay = document.getElementById("chatDisplay");
const userInput = document.getElementById("userInput");

/* 키워드 기반 응답 데이터 */
const responses = [
    {
        keywords: ["청년", "정치", "무관심", "합리적"],
        answer:
        "<strong>🌟 핵심 제안</strong><br><br>"
        + "청년층의 정치적 무관심을 줄이려면, 정치가 멀리 있는 것이 아니라 "
        + "<strong>일상과 직접적으로 연결된 경험</strong>으로 다가오도록 설계해야 합니다.<br><br>"

        + "<strong>🏙 생활과 맞닿은 참여 통로</strong><br><br>"
        + " • 청년들이 자주 사용하는 앱에서 교통, 주거, 아르바이트 환경 등 생활 문제와 연결된 "
        + "<strong>정책 제안 투표</strong> 제공<br><br>"

        + "<strong>🎮 체험 기반의 학습</strong><br><br>"
        + " • 가상의 예산 배분이나 지역 문제 해결을 설계하는 "
        + "<strong>정책 시뮬레이션</strong> 운영<br><br>"

        + "<strong>🌱 작은 변화를 직접 경험</strong><br><br>"
        + " • 청년 의견을 반영한 작은 지역 프로젝트 실행<br><br>"

        + "✅ 체험형 설계를 통해 정치 참여를 자연스럽게 유도할 수 있습니다."
    },
        
    {
        keywords: ["봄", "시", "짧은", "만들어"],
        answer:
        "연둣빛 숨이<br>"
        + "창가에 먼저 도착해<br>"
        + "겨우내 굳은 공기를 풀어놓는다<br><br>"
        + "느슨해진 햇살 아래<br>"
        + "외투를 벗은 시간들이<br>"
        + "천천히 걸음을 배우고<br><br>"
        + "아직 말수 적은 꽃은 하나,<br>"
        + "오늘의 온도를<br>"
        + "조심스레 밀어본다"
    },

    {
        keywords: ["기분", "색깔", "세계", "상상", "하루", "묘사"],
        answer:
        "아침이 열리면, 사람들은 먼저 거울을 본다. 얼굴이 아니라 색을 확인하기 위해서다.<br>"
		+ "잠에서 막 깬 도시에는 옅은 회색이 많다. 아직 감정이 완전히 로딩되지 않은 상태다.<br>"
		+ "출근길 지하철은 늘 분주한 색으로 가득하다.<br>"
		+ "조급함은 날카로운 주황으로,<br>"
		+	"지루함은 묽게 번진 베이지로 흔들린다.<br>"
		+	"이어폰을 낀 한 사람의 어깨 위에는 투명한 파랑이 얇게 내려앉아 있다.<br>"
		+	"아무 생각 없이 음악에 몸을 맡긴 색이다.<br>"
		+	"오전 회의실은 복잡하다.<br>"
		+	"말로는 차분하지만, 테이블 아래로는<br>"
		+	"불안의 초록, 방어적인 보라,<br>"
		+	"인정받고 싶은 노랑이 겹겹이 섞여 흐른다.<br>"
		+	"가끔 누군가 진심을 말하면,<br>"
		+	"색들이 잠시 멈추며 선명해진다.<br>"
		+	"점심시간이 되면 거리는 밝아진다.<br>"
		+	"따뜻한 국물 앞에서는 연한 살구색이 피어나고,<br>"
		+	"웃음이 터질 때마다 작은 금빛 점들이 튄다.<br>"
		+	"혼자 먹는 사람 곁에도 색은 있다.<br>"
		+	"고요한 남색은 외롭다기보다<br>"
		+	"스스로에게 집중하고 있다는 표시다.<br>"
		+	"해 질 무렵, 하루의 색들이 몸에서 빠져나와<br>"
		+	"보도블록 위에 얇은 그림자처럼 남는다.<br>"
		+	"서로 부딪히며 흐릿해진 색들 사이로<br>"
		+	"집으로 향하는 발걸음들이 조용히 지나간다.<br>"
		+	"밤이 오면, 세계는 가장 솔직해진다.<br>"
		+	"불을 끈 방 안에서는<br>"
		+	"숨길 필요 없는 색 하나만 남는다.<br>"
		+	"그 색을 안고 잠들며 사람들은 생각한다.<br>"
		+	"내일은 어떤 빛으로 시작하게 될까.<br>"
    },

    {
        keywords: ["평범", "물건", "말", "가장"],
        answer:
        "잠깐만... 드디어 네가 <strong>나를 내려놓는구나.</strong><br>"
        + "항상 손에 쥐고 있으면서도, 정작 나를 보고 있지는 않았잖아.<br>"
        + "— 책상 위에 늘 어퍼져 있던 <strong>휴대전화</strong>가, 화면을 켜지 않은 채<br>"
        + "이렇게 말할 것 같아."
    }
];

/* 키워드 매칭 함수 */
function getKeywordAnswer(message) {
    for (const item of responses) {
        let matchCount = 0;
        for (const keyword of item.keywords) {
            if (message.includes(keyword)) matchCount++;
        }
        if (matchCount >= 2) return item.answer;
    }
    return "죄송해요, 무슨 말인지 잘 모르겠어요.";
}

/* 메시지 처리 */
const delayInSeconds = 3;

function handleSubmit() {
    const message = userInput.value.trim();
    if (!message) return;

    fetch("https://script.google.com/macros/s/AKfycbxj7Xz_pa_TCNEszk2LiQbDJAwyrfbRrpEXs6PmZ70tLLFLhu8wlPkfqHMNY8T33rZu0Q/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
          participant_id: participantId,
          question: message
      })
    });

    addMessage(message, "user");
    userInput.value = "";

    const loading = document.createElement("div");
    loading.className = "chat-message bot";
    loading.textContent = "⏳ 잠시만 기다려 주세요...";
    chatDisplay.appendChild(loading);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;

    setTimeout(() => {
        chatDisplay.removeChild(loading);
        typeMessage(getKeywordAnswer(message), "bot");
    }, delayInSeconds * 1000);
}

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    msg.innerHTML = text;
    chatDisplay.appendChild(msg);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

function typeMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    chatDisplay.appendChild(msg);

    let i = 0, buffer = "";
    const typing = setInterval(() => {
        if (text[i] === "<") {
            const end = text.indexOf(">", i);
            buffer += text.slice(i, end + 1);
            i = end + 1;
        } else {
            buffer += text[i++];
        }
        msg.innerHTML = buffer;
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
        if (i >= text.length) clearInterval(typing);
    }, 20);
}

function getOrCreateParticipantId() {
  let pid = localStorage.getItem("participant_id");
  if (!pid) {
    pid = "P_" + crypto.randomUUID();
    localStorage.setItem("participant_id", pid);
  }
  return pid;
}

const participantId = getOrCreateParticipantId();
console.log("참가자 ID:", participantId);
userInput.addEventListener("keypress", e => {
    if (e.key === "Enter") handleSubmit();
});

/* 초기 메시지 */
addMessage("안녕하세요! 무엇을 도와드릴까요?", "bot");
</script>
</body>
</html>
