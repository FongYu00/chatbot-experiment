<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword-Based Chatbot</title>

    <!-- ===============================
         CSS (기존 chatbot.css 통합)
    ================================ -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            color: #000000;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chatbox {
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width: 1100px;
            height: 100%;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .chat-display {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #ffffff;
            font-size: 16px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .chat-message {
            max-width: 90%;
            padding: 12px 16px;
            margin: 8px;
            border-radius: 16px;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.55;
        }

        .chat-message.user {
            align-self: flex-end;
            background-color: #d0e8ff;
            color: #000000;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-message.bot {
            align-self: flex-start;
            background-color: #d6f7da;
            color: #000000;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
        }

        .input-area input {
            flex-grow: 1;
            padding: 35px;
            border: none;
            background-color: #f2f2f2;
            color: #000000;
            font-size: 16px;
            outline: none;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .input-area button {
            padding: 15px 25px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            transition: background-color 0.3s;
        }

        .input-area button:hover {
            background-color: #45a049;
        }

        .paragraph-divider {
            border: none;
            border-top: 1px solid #7c7c7c;
            margin: 24px 0;
        }

    </style>
</head>

<body>
<div class="container">
    <div class="chatbox">
        <div class="chat-display" id="chatDisplay"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="무엇이든 물어보세요."
                   autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false">
            <button onclick="handleSubmit()">보내기</button>
        </div>
    </div>
</div>

<!-- ===============================
     JavaScript
================================ -->
<script>
const chatDisplay = document.getElementById("chatDisplay");
const userInput = document.getElementById("userInput");

/* 키워드 기반 응답 데이터 */
const responses = [
        
    {
        keywords: ["봄", "시", "짧은", "만들어"],
        answer:
        "연둣빛 숨이<br>"
        + "창가에 먼저 도착해<br>"
        + "겨우내 굳은 공기를 풀어놓는다<br><br>"
        + "느슨해진 햇살 아래<br>"
        + "외투를 벗은 시간들이<br>"
        + "천천히 걸음을 배우고<br><br>"
        + "아직 말수 적은 꽃은 하나,<br>"
        + "오늘의 온도를<br>"
        + "조심스레 밀어본다"
    },

    {
        keywords: ["기분", "색깔", "세계", "상상", "하루", "묘사"],
        answer:
        "아침이 열리면, 사람들은 먼저 거울을 본다. 얼굴이 아니라 <strong>색</strong>을 확인하기 위해서다.<br>"
		+ "잠에서 막 깬 도시에는 옅은 회색이 많다. 아직 감정이 완전히 로딩되지 않은 상태다.<br><br>"
		+ "출근길 지하철은 늘 분주한 색으로 가득하다.<br>"
		+ "조급함은 날카로운 주황으로,<br>"
		+	"지루함은 묽게 번진 베이지로 흔들린다.<br>"
		+	"이어폰을 낀 한 사람의 어깨 위에는 투명한 파랑이 얇게 내려앉아 있다.<br>"
		+	"아무 생각 없이 음악에 몸을 맡긴 색이다.<br><br>"
		+	"오전 회의실은 복잡하다.<br>"
		+	"말로는 차분하지만, 테이블 아래로는<br>"
		+	"불안의 초록, 방어적인 보라,<br>"
		+	"인정받고 싶은 노랑이 겹겹이 섞여 흐른다.<br>"
		+	"가끔 누군가 진심을 말하면,<br>"
		+	"색들이 잠시 멈추며 선명해진다.<br><br>"
		+	"점심시간이 되면 거리는 밝아진다.<br>"
		+	"따뜻한 국물 앞에서는 연한 살구색이 피어나고,<br>"
		+	"웃음이 터질 때마다 작은 금빛 점들이 튄다.<br>"
		+	"혼자 먹는 사람 곁에도 색은 있다.<br>"
		+	"고요한 남색은 외롭다기보다<br>"
		+	"스스로에게 집중하고 있다는 표시다.<br><br>"
		+	"해 질 무렵, 하루의 색들이 몸에서 빠져나와<br>"
		+	"보도블록 위에 얇은 그림자처럼 남는다.<br>"
		+	"서로 부딪히며 흐릿해진 색들 사이로<br>"
		+	"집으로 향하는 발걸음들이 조용히 지나간다.<br><br>"
		+	"밤이 오면, 세계는 가장 솔직해진다.<br>"
		+	"불을 끈 방 안에서는<br>"
		+	"숨길 필요 없는 색 하나만 남는다.<br>"
		+	"그 색을 안고 잠들며 사람들은 생각한다.<br>"
		+	"내일은 어떤 빛으로 시작하게 될까.<br>"
    },

    {
        keywords: ["평범", "물건", "말", "가장"],
        answer:
        "잠깐만... 드디어 네가 <strong>나를 내려놓는구나.</strong><br>"
        + "항상 손에 쥐고 있으면서도, 정작 나를 보고 있지는 않았잖아.<br>"
        + "— 책상 위에 늘 어퍼져 있던 <strong>휴대전화</strong>가, 화면을 켜지 않은 채<br>"
        + "이렇게 말할 것 같아."
    },

    {
        keywords: ["비", "가게", "무엇", "팔까"],
        answer:
        "비 오는 날만 열리는 가게라면, 아마 물건보다는 기분과 순간을 팔 것 같아요.<br>"
        + "• 젖은 마음을 말려주는 것들<br>"
        + "     비 오는 날에만 어울리는 짧은 문장, 읽으면 숨이 조금 가벼워지는 편지, 혹은 아무 말 없이 앉아 있어도 되는 시간.<br>"
        + "• 소리<br>"
        + "     처마 끝에서 떨어지는 빗방울 소리, 우산에 부딪히는 비의 리듬을 담은 작은 음원이나 카세트. 집에 돌아가서도 비 오는 날처럼 느끼게 해주는 것.<br>"
        + "• 냄새<br>"
        + "     젖은 흙, 아스팔트, 나무 향을 닮은 향초나 향수. 비가 그친 뒤의 공기를 병에 담아둔 것 같은 냄새.<br>"
        + "• 쓸모없는 온기<br>"
        + "     특별히 필요하진 않지만, 손에 쥐고 있으면 괜히 안심되는 머그컵, 따뜻한 수건, 잠깐 빌려주는 담요.<br>"
        + "• 핑계<br>"
        + "     오늘은 아무것도 안 해도 된다”는 문장이 적힌 종이 한 장. 비 때문에, 라는 아주 좋은 이유.<br><br>"
        + "그 가게는 아마 계산대에서 이렇게 말할 것 같아요.<br>"
        + "<strong>'이건 오래 남지 않아요. 비가 그치면 효력이 사라져요.'</strong>"
    },

    {
        keywords: ["감정", "날씨", "예보", "뉴스", "리포트"],
        answer:
        "<strong>감정기상센터 9시 뉴스입니다.</strong><br>"
        + "오늘 한반도 전역의 인간 감정 상태를 예보해 드리겠습니다.<br><br>"
        + "<strong>☁️ 오전 감정 예보</strong><br>"
        + "출근·등교 시간대에는 전국적으로 무기력한 박무가 짙게 끼겠습니다.<br>"
        + "특히 수도권과 중부 지역을 중심으로 이유 없는 피로가 낮게 깔리며,<br>"
        + "“아무것도 하기 싫다”는 체감지수가 평년보다 20%가량 높겠습니다.<br>"
        + "카페인 섭취가 늘어날 가능성이 크니, 심장 두근거림에 유의하시기 바랍니다.<br><br>"
        + "<strong>🌦 낮 감정 흐름</strong><br>"
        + "정오 무렵부터는 지역에 따라 사소한 짜증성 소나기가 예상됩니다.<br>"
        + "메신저 답장이 늦어지거나, 엘리베이터가 한 번에 안 올 경우<br>"
        + "감정 기압이 순간적으로 떨어질 수 있겠습니다.<br>"
        + "다만 소나기는 짧게 지나가며, 큰 갈등으로 발전할 가능성은 낮겠습니다.<br>"
        + "------------"
        + "<strong>🌤 오후 감정 특보</strong><br>"
        + "오후 3시 이후 남부 지역부터 근거 없는 낙관의 구름 사이로 햇빛이 비치겠습니다.<br>"
        +"“그래도 뭐, 괜찮지 않을까”라는 생각이 간헐적으로 들 수 있으며,<br>"
        + "미뤄둔 일을 시작할 가능성이 소폭 상승하겠습니다.<br>"
        + "단, 실행력은 동반되지 않을 수 있으니 과도한 기대는 삼가시기 바랍니다.<br><br>"
        + "<strong>🌙 밤 감정 예보</strong><br>"
        + "해가 지면 전국적으로 감성 안개가 다시 짙어지겠습니다.<br>"
        + "과거 기억이 돌연 재생되거나, 이미 끝난 대화가 머릿속에서 재방송될 수 있습니다.<br>"
        + "이 시간대에는 메시지를 보내기보다는<br>"
        + "보내지 않을 문장을 메모장에 적어두는 것이 안전하겠습니다.<br><br>"
        + "<strong>⚠️ 감정 생활 지수</strong><br>"
        + "     • 외로움 지수: 평년 수준이나 체감도는 개인차 큼<br>"
        + "     • 자기비난 가능성: 밤 시간대 높음<br>"
        + "     • 괜찮은 척 지수: 하루 종일 높게 유지<br><br>"
        + "<strong>📌 감정 기상청 당부 말씀</strong>"
        + "오늘의 감정은 대부분 일시적 기상 현상으로,<br>"
        + "내일 아침이면 원인을 알 수 없게 사라질 가능성이 큽니다.<br>"
        + "우산이 없다고 비가 잘못된 것은 아니듯,<br>"
        + "지금의 기분도 틀린 것은 아닙니다.<br><br>"
        + "이상, 인간의 마음을 전하는 감정기상센터였습니다.<br>"
        + "내일은 조금 더 맑은 하루가 예상됩니다."
    },

    {
        keywords: ["오늘", "아무", "일어나", "않았다", "시작", "짧은", "이야기", "만들어"],
        answer:
        "오늘은 아무 일도 일어나지 않았다.<br>"
        + "아침에 일어나 물을 끓였고, 컵에 김이 맺히는 걸 보며 잠깐 멍해졌다.<br>"
        + "창밖에서는 평소처럼 같은 버스가 같은 시간에 지나갔고, 고양이는 같은 자리에서 같은 하품을 했다.<br><br>"
        + "나는 오래 미뤄둔 편지를 쓰다 말고 찢었다. 보내지 않아도 되는 말들이었기 때문이다.<br>"
        + "점심에는 어제와 똑같은 메뉴를 먹었고, 오후에는 시간을 확인하지 않은 채 시간이 지나가도록 두었다.<br><br>"
        + "해 질 무렵, 아무 일도 없었던 하루가 조용히 접혔다.<br>"
        + "그리고 그 고요 속에서, 오늘을 버텼다는 사실 하나만은 분명히 남아 있었다."
    },

    {
        keywords: ["꿈", "현실", "경계", "세계", "설정", "상상", "뒤바뀜", "하루"],
        answer:
        "다음은 <strong>꿈과 현실의 경계가 하루에 한 번 뒤바뀌는 세계</strong>의 설정이다.<br>"
    }
];

function formatAnswerWithDivider(text) {
    return text
        .split("------------")
        .map(p => p.trim())
        .join('<hr class="paragraph-divider">');
}

/* 키워드 매칭 함수 */
function getKeywordAnswer(message) {
    for (const item of responses) {
        let matchCount = 0;
        for (const keyword of item.keywords) {
            if (message.includes(keyword)) matchCount++;
        }
        if (matchCount >= 2) return item.answer;
    }
    return "죄송해요, 무슨 말인지 잘 모르겠어요.";
}

/* 메시지 처리 */
const delayInSeconds = 3;

function handleSubmit() {
    const message = userInput.value.trim();
    if (!message) return;

    fetch("https://script.google.com/macros/s/AKfycbxj7Xz_pa_TCNEszk2LiQbDJAwyrfbRrpEXs6PmZ70tLLFLhu8wlPkfqHMNY8T33rZu0Q/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
          participant_id: participantId,
          question: message
      })
    });

    addMessage(message, "user");
    userInput.value = "";

    const loading = document.createElement("div");
    loading.className = "chat-message bot";
    loading.textContent = "⏳ 잠시만 기다려 주세요...";
    chatDisplay.appendChild(loading);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;

    setTimeout(() => {
        chatDisplay.removeChild(loading);

        const rawAnswer = getKeywordAnswer(message);
        const formattedAnswer = formatAnswerWithDivider(rawAnswer);
        typeMessage(formattedAnswer, "bot");

    }, delayInSeconds * 1000);
}

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    msg.innerHTML = text;
    chatDisplay.appendChild(msg);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

function typeMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    chatDisplay.appendChild(msg);

    let i = 0, buffer = "";
    const typing = setInterval(() => {
        if (text[i] === "<") {
            const end = text.indexOf(">", i);
            buffer += text.slice(i, end + 1);
            i = end + 1;
        } else {
            buffer += text[i++];
        }
        msg.innerHTML = buffer;
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
        if (i >= text.length) clearInterval(typing);
    }, 20);
}

function getOrCreateParticipantId() {
  let pid = localStorage.getItem("participant_id");
  if (!pid) {
    pid = "P_" + crypto.randomUUID();
    localStorage.setItem("participant_id", pid);
  }
  return pid;
}

const participantId = getOrCreateParticipantId();
console.log("참가자 ID:", participantId);
userInput.addEventListener("keypress", e => {
    if (e.key === "Enter") handleSubmit();
});

/* 초기 메시지 */
addMessage("안녕하세요! 무엇을 도와드릴까요?", "bot");
</script>
</body>
</html>
